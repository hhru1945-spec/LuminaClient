name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      # Мы добавили --continue (чтобы увидеть все ошибки сразу) и убрали лишние проверки
      run: ./gradlew assembleDebug --continue -x test

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Lumina-Client-Debug
        # Ищем APK во всех папках проекта на случай, если он не в /app/
        path: "**/build/outputs/apk/debug/*.apk"
