name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ЭТОТ ШАГ ВАЖЕН: обманываем Google Services
    - name: Create dummy google-services.json
      run: |
        mkdir -p app/
        echo '{"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"0","android_client_info":{"package_name":"com.lumina.client"}},"api_key":[{"current_key":"dummy"}]}]}' > app/google-services.json

    - name: Build with Gradle
      # Используем assembleDebug, чтобы получить APK
      run: ./gradlew assembleDebug --continue -x test

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Lumina-Client-Debug
        # Ищем любой APK во всем проекте
        path: "**/build/outputs/apk/debug/*.apk"
      
